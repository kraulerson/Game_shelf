services:
  backend:
    build:
      context: ./backend
      dockerfile: ../Dockerfile.backend
    ports:
      - "3001:3001"
    env_file: .env
    volumes:
      - gameshelf_data:/app/data
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: ../Dockerfile.frontend
      target: ${FRONTEND_TARGET:-prod}
    ports:
      - "${FRONTEND_PORT:-80}:${FRONTEND_INTERNAL_PORT:-80}"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  gameshelf_data:

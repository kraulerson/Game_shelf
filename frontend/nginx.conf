server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Enable gzip
    gzip on;
    gzip_types text/html application/javascript text/css application/json;
    gzip_min_length 1000;

    # Never cache the SPA entry point — it references content-hashed assets.
    # Prevents a stale index.html from pointing at old hashes after a redeploy.
    location = /index.html {
        add_header Cache-Control "no-cache";
    }

    # Content-hashed build assets are safe to cache forever.
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # SPA routing — serve index.html for all non-file requests
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API requests to backend
    location /api/ {
        proxy_pass http://backend:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Proxy image requests to backend (images served by Express static)
    location /data/images/ {
        proxy_pass http://backend:3001;
        proxy_set_header Host $host;
        # Cache images for 7 days
        add_header Cache-Control "public, max-age=604800";
    }
}
